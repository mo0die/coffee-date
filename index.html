<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Note</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
            arabic: ['Noto Naskh Arabic', 'serif'],
          },
          colors: {
            ink: '#0D0D0D',
            pop: {
              pink: '#FF2D87',
              blue: '#1A7FFF',
              yellow: '#FFBE00',
            },
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { background: #FFFFFF; font-family: 'DM Sans', sans-serif; }

    @keyframes wiggle { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
    @keyframes steam { 0% { opacity: 0; transform: translateY(0) scaleX(1); } 50% { opacity: 0.6; transform: translateY(-10px) scaleX(1.2); } 100% { opacity: 0; transform: translateY(-22px) scaleX(0.8); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    .wiggle { animation: wiggle 2s ease-in-out infinite; }
    .bounce { animation: bounce 1.5s ease-in-out infinite; }

    .nb-shadow { box-shadow: 4px 4px 0px #1a1a1a; }
    .nb-shadow-sm { box-shadow: 3px 3px 0px #1a1a1a; }
    .nb-shadow-lg { box-shadow: 6px 6px 0px #1a1a1a; }
    .nb-border { border: 2.5px solid #0D0D0D; }
    .nb-border-thin { border: 2px solid #0D0D0D; }

    .phone-frame {
      width: 100%;
      max-width: 390px;
      overflow-x: hidden;
    }
    @media (min-width: 500px) {
      .phone-frame {
        border-radius: 2.5rem;
        border: 3px solid #0D0D0D;
        box-shadow: 8px 8px 0px #0D0D0D;
      }
    }

    .sticker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 9999px;
      border: 2px solid #0D0D0D;
      box-shadow: 2px 2px 0px #0D0D0D;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .steam-line {
      position: absolute;
      width: 2px;
      height: 16px;
      background: #0D0D0D;
      border-radius: 999px;
      opacity: 0;
      animation: steam 2s ease-out infinite;
    }
  </style>
</head>
<body class="min-h-dvh flex items-center justify-center bg-white p-0 sm:p-6">
  <div id="root"></div>

  <script type="text/babel">

    function Sticker({ children, color, className = '', rotate = '' }) {
      return (
        <span className={`sticker ${color} ${rotate} ${className}`}>
          {children}
        </span>
      );
    }

    function CoffeeCup() {
      return (
        <div className="relative w-28 h-28 mx-auto">
          <svg viewBox="0 0 120 120" className="w-full h-full">
            <rect x="20" y="45" width="65" height="55" rx="8" fill="#FFBE00" stroke="#0D0D0D" strokeWidth="3" />
            <path d="M85 55 Q105 55 105 70 Q105 85 85 85" fill="none" stroke="#0D0D0D" strokeWidth="3" />
            <ellipse cx="52" cy="45" rx="33" ry="5" fill="#FFFFFF" stroke="#0D0D0D" strokeWidth="3" />
            <rect x="35" y="100" width="45" height="6" rx="3" fill="#0D0D0D" opacity="0.08" />
          </svg>
          <div className="steam-line" style={{ left: '35%', top: '8px', animationDelay: '0s' }} />
          <div className="steam-line" style={{ left: '50%', top: '4px', animationDelay: '0.6s' }} />
          <div className="steam-line" style={{ left: '65%', top: '8px', animationDelay: '1.2s' }} />
        </div>
      );
    }

    function App() {
      const [answer, setAnswer] = React.useState(null);
      const formRef = React.useRef(null);
      const inputRef = React.useRef(null);

      function handleAnswer(choice) {
        setAnswer(choice);
        inputRef.current.value = choice;
        formRef.current.submit();
      }

      return (
        <div className="phone-frame bg-white relative">
          <iframe name="hidden_iframe" style={{ display: 'none' }} />
          <form
            ref={formRef}
            action="https://formsubmit.co/ahmadsalaymeh@protonmail.com"
            method="POST"
            target="hidden_iframe"
            style={{ display: 'none' }}
          >
            <input type="hidden" name="answer" ref={inputRef} />
            <input type="hidden" name="_subject" value="Coffee Date Response" />
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_template" value="table" />
          </form>

          {/* hero section */}
          <div className="relative px-6 pt-10 pb-8 overflow-hidden">
            <div className="absolute top-4 left-4 w-16 h-16 bg-pop-pink/30 rounded-full nb-border-thin" style={{ borderStyle: 'dashed' }} />
            <div className="absolute top-12 right-6 w-6 h-6 bg-pop-yellow/50 rounded-full nb-border-thin" />
            <div className="absolute bottom-4 right-8 w-10 h-10 bg-pop-blue/30 rounded-lg nb-border-thin rotate-12" />

            <div className="relative z-10">
              <div className="flex gap-2 mb-6">
                <Sticker color="bg-pop-pink" rotate="rotate-[-3deg]">Lana</Sticker>
                <Sticker color="bg-pop-blue" rotate="rotate-[2deg]">Ahmad</Sticker>
              </div>


              <h1 className="font-heading text-[2.8rem] font-bold text-ink leading-[1.05] tracking-tight">
                hey,<br />
                <span className="relative inline-block">
                  coffee date?
                  <div className="absolute -bottom-1 left-0 right-0 h-3 bg-pop-yellow -z-10 rounded-sm" />
                </span>
              </h1>
            </div>
          </div>

          {/* divider */}
          <div className="px-6">
            <div className="h-[2.5px] bg-ink/8 rounded-full" />
          </div>

          {/* coffee cup */}
          <div className="py-8 wiggle">
            <CoffeeCup />
          </div>

          {/* divider */}
          <div className="px-6">
            <div className="h-[2.5px] bg-ink/8 rounded-full" />
          </div>

          {/* message bubbles */}
          <div className="px-6 py-8 space-y-4">
            <div className="flex items-center gap-2 mb-2">
              <Sticker color="bg-pop-yellow" rotate="rotate-[-1deg]">a note for you</Sticker>
              <div className="flex-1 h-[2px] bg-ink/8" />
            </div>

            <div className="bg-white nb-border rounded-2xl nb-shadow p-5">
              <p className="font-body text-ink text-[0.95rem] leading-relaxed">
                Hi Lana, I dont know how to to do this but i want to ask you out on a date.
                Laila my good friend told me about you and said you're a great person. I should 
                ask you out on a date.
              </p>
            </div>

            <div className="bg-white nb-border rounded-2xl nb-shadow p-5">
              <p className="font-body text-ink text-[0.95rem] leading-relaxed">
                I really like Hollys cafe and um yeah are you free on the 22nd of March?
                around 1pm? 
              </p>
            </div>
          </div>

          {/* divider */}
          <div className="px-6">
            <div className="h-[2.5px] bg-ink/8 rounded-full" />
          </div>

          {/* yes / no buttons */}
          <div className="px-6 py-8">
            <p className="text-center font-heading font-bold text-ink text-sm uppercase tracking-wider mb-5">so... what do you say?</p>

            {!answer ? (
              <div className="flex gap-4 justify-center">
                <button
                  onClick={() => handleAnswer('Yes')}
                  className="bg-pop-pink nb-border rounded-xl nb-shadow px-8 py-3 font-heading font-bold text-ink text-lg uppercase tracking-wide active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all"
                >
                  Yes!
                </button>
                <button
                  onClick={() => handleAnswer('No')}
                  className="bg-pop-blue nb-border rounded-xl nb-shadow px-8 py-3 font-heading font-bold text-ink text-lg uppercase tracking-wide active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all"
                >
                  No
                </button>
              </div>
            ) : (
              <div className="text-center bounce">
                <div className="inline-block bg-pop-yellow nb-border rounded-2xl nb-shadow p-5">
                  <p className="font-heading font-bold text-ink text-xl">
                    {answer === 'Yes' ? 'See you there!' : 'No worries!'}
                  </p>
                </div>
              </div>
            )}
          </div>

          {/* hidden activation link */}
          <div className="text-center pb-6">
            <a href="activate.html" className="text-xs text-ink/10 hover:text-ink/30 transition-colors">.</a>
          </div>

        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
